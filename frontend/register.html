<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">">
</head>
<body>
    <div>
        <h1>Register Page</h1>
        <form>
            <label for="exampleFormControlInput1" class="form-label">Name</label>
            <input type="name" class="form-control" id="name" placeholder="name"> <br> 
            <label for="exampleFormControlInput1" class="form-label">Email</label>
            <input type="Email" class="form-control" id="Email" placeholder="email"> <br> 
            <label for="exampleFormControlInput1" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="password"> <br> 
            <label for="exampleFormControlInput1" class="form-label">Re-Password</label>
            <input type="re-password" class="form-control" id="re-password" placeholder="re-password"> <br> 
            <button id="reg-button">Register</button>
            <p>Already have an account?<a href="login.html">click here to login</a></p>     
        </form>
    </div>
    <script src="register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
